<hsc-page-container
  title="Nova news"
  subtitle="Crie um novo draft administrativo para o domínio de news."
>
  <section class="news-create-page">
    <mat-card class="news-create-page__card" appearance="outlined">
      <mat-card-content>
        <hsc-news-form
          mode="create"
          [submitting]="submitting()"
          [errorMessage]="error()"
          (formSubmit)="submit($event)"
          (cancel)="cancel()"
        />
      </mat-card-content>
    </mat-card>
  </section>
</hsc-page-container>
