<main class="login-page">
  <h1>HSC Backoffice Admin</h1>
  <p>Área administrativa do ecossistema HSC.</p>
  <p>Fluxo local de desenvolvimento com Auth API real.</p>

  <button
    type="button"
    (click)="handleBootstrapDevSession()"
    [disabled]="isBootstrapping()"
  >
    @if (isBootstrapping()) {
      Criando sessão local...
    } @else {
      Criar sessão local de desenvolvimento
    }
  </button>
</main>
