<section class="seasons-create-page">
  <header class="seasons-create-page__header">
    <div>
      <h1 class="seasons-create-page__title">Nova season</h1>
      <p class="seasons-create-page__description">
        Crie um novo draft para um ciclo competitivo oficial do servidor HSC.
      </p>
    </div>
  </header>

  <hsc-seasons-form
    [submitting]="submitting()"
    [errorMessage]="error()"
    (formSubmit)="submit($event)"
    (cancel)="cancel()"
  />
</section>
